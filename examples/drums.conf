# Drum triggers on MIDI channel 10: each port fires for one specific note.
# columns: <port> <source> <midich> <param> <scale> <offset>
#   trig 'param' is the note number that fires this gate (drum style)

name      drums

kick      trig     10  36   0.5  0.0    # C1  -> ~5V trigger
snare     trig     10  38   0.5  0.0    # D1
clhat     trig     10  42   0.5  0.0    # F#1
ophat     trig     10  46   0.5  0.0    # A#1
clap      trig     10  39   0.5  0.0    # D#1
rim       trig     10  37   0.5  0.0    # C#1
tom       trig     10  41   0.5  0.0    # F1
cow       trig     10  56   0.5  0.0    # G#2
