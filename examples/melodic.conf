# Melodic mono voice on MIDI channel 1: 1 pitch + 1 gate + 1 velocity.
# columns: <port> <source> <midich> <param> <scale> <offset>
#   param = note number (trig) or CC number (cc); "-" otherwise
#   scale/offset are per-output calibration constants (see README)

name      melodic

pitch1    pitch    1   -    0.008333  0.0     # ~1V/octave; calibrate scale/offset
gate1     gate     1   -    0.5       0.0     # ~5V when a note is held
vel1      vel      1   -    0.5       0.0     # velocity 0..127 -> 0..~5V
mod1      cc       1   1    0.5       0.0     # mod wheel (CC 1) -> 0..~5V

# Optionally auto-connect to the soundcard feeding the ES-3:
connect pitch1 system:playback_19
connect gate1  system:playback_20
