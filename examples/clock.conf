# MIDI-clock divisions. Clock is system-wide (no MIDI channel), so the midich
# column is '-'. Runs on incoming 0xF8 clocks; a sequencer's Start resets the
# phase, Stop drops the outputs low, Continue resumes.
#
# columns: <port> clock <-> <division> <high> <low> [pulse_ms]
#   division = MIDI clocks per pulse (24 = quarter, 12 = 8th, 6 = 16th, 96 = bar)
#   high/low via scale/offset: sample = offset(+scale when high); pulse_ms = width

name      clock

quarter   clock  -  24  0.5  0.0  5
eighth    clock  -  12  0.5  0.0  5
sixteenth clock  -   6  0.5  0.0  3
bar       clock  -  96  0.5  0.0  10
