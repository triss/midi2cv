<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 1010" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333333"/>
    </marker>
  </defs>
  <rect width="1340" height="1010" fill="#ffffff"/>
  <text x="50" y="56" font-size="29" font-weight="700" fill="#111111">midi2cv · the signal flow</text>
  <text x="50" y="86" font-size="16" fill="#444444">One JACK block, top to bottom: MIDI bytes in → calibrated voltages out.</text>

  <!-- 1 MIDI source -->
  <rect x="130" y="120" width="500" height="64" rx="11" fill="#ffffff" stroke="#555555" stroke-width="2.5"/>
  <text x="150" y="148" font-size="16" font-weight="700" fill="#222222">MIDI source — keyboard / sequencer</text>
  <text x="150" y="170" font-size="14" fill="#444444">notes · CC · clock 0xF8 · start / stop / continue</text>
  <line x1="380" y1="184" x2="380" y2="222" stroke="#333333" stroke-width="2.4" marker-end="url(#ar)"/>

  <!-- 2 midi_in -->
  <rect x="130" y="224" width="500" height="62" rx="11" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
  <text x="150" y="251" font-size="16" font-weight="700" fill="#0061a8">JACK · midi_in port</text>
  <text x="150" y="273" font-size="14" fill="#333333">raw timestamped MIDI bytes for this block</text>
  <line x1="380" y1="286" x2="380" y2="324" stroke="#333333" stroke-width="2.4" marker-end="url(#ar)"/>

  <!-- 3 process -->
  <rect x="130" y="326" width="500" height="96" rx="11" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
  <text x="150" y="353" font-size="16" font-weight="700" fill="#0061a8">JACK · process(nframes) — audio callback</text>
  <text x="150" y="376" font-size="14" fill="#333333">grab the MIDI buffer + every output buffer</text>
  <text x="150" y="398" font-size="14" fill="#333333">copy JACK events → portable midi_ev[]</text>
  <text x="150" y="416" font-size="13" fill="#0061a8">test mode? hold one port at a fixed sample, skip the engine</text>
  <line x1="380" y1="422" x2="380" y2="470" stroke="#333333" stroke-width="2.4" marker-end="url(#ar)"/>

  <!-- seam -->
  <line x1="70" y1="460" x2="660" y2="460" stroke="#777777" stroke-width="2.5" stroke-dasharray="2 7"/>
  <text x="70" y="454" font-size="13" font-weight="700" fill="#555555">engine.h seam — only midi_ev · planar float · sample_rate cross</text>

  <!-- 4 engine_run -->
  <rect x="130" y="478" width="500" height="98" rx="11" fill="#ffffff" stroke="#7a3e9d" stroke-width="2.5"/>
  <text x="150" y="505" font-size="16" font-weight="700" fill="#7a3e9d">ENGINE · engine_run(evs, nev, outs, nframes)</text>
  <text x="150" y="528" font-size="14" fill="#333333">walk events in time order; fill output up to each</text>
  <text x="150" y="550" font-size="14" fill="#333333">event with current state, then apply it</text>
  <text x="150" y="568" font-size="13" fill="#7a3e9d">note_on/off · cc · clock_tick / clock_stop  (mutate state)</text>
  <line x1="380" y1="576" x2="380" y2="612" stroke="#333333" stroke-width="2.4" marker-end="url(#ar)"/>

  <!-- 5 fill_segment / render -->
  <rect x="130" y="614" width="500" height="96" rx="11" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="150" y="641" font-size="16" font-weight="700" fill="#c04a00">ENGINE · fill_segment → render adapters</text>
  <text x="150" y="664" font-size="14" fill="#333333">each output renders into its frame range:</text>
  <text x="150" y="686" font-size="14" fill="#333333">render_const · render_clock · render_glide</text>
  <text x="150" y="704" font-size="13" fill="#c04a00">writes planar float samples into outs[i]</text>
  <line x1="380" y1="710" x2="380" y2="748" stroke="#333333" stroke-width="2.4" marker-end="url(#ar)"/>

  <!-- seam back -->
  <line x1="70" y1="738" x2="660" y2="738" stroke="#777777" stroke-width="2.5" stroke-dasharray="2 7"/>
  <text x="70" y="732" font-size="13" font-weight="700" fill="#555555">back across the seam — the adapter never knew which source was which</text>

  <!-- 6 audio ports -->
  <rect x="130" y="756" width="500" height="62" rx="11" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
  <text x="150" y="783" font-size="16" font-weight="700" fill="#0061a8">JACK · audio output ports</text>
  <text x="150" y="805" font-size="14" fill="#333333">one DC-coupled audio port per CV output</text>
  <line x1="380" y1="818" x2="380" y2="856" stroke="#333333" stroke-width="2.4" marker-end="url(#ar)"/>

  <!-- 7 ES-3 -->
  <rect x="130" y="858" width="500" height="80" rx="11" fill="#ffffff" stroke="#0b7a4b" stroke-width="2.5"/>
  <text x="150" y="886" font-size="16" font-weight="700" fill="#0b7a4b">soundcard → ES-3 → control voltage → modular</text>
  <text x="150" y="909" font-size="14" fill="#333333">sample = offset + value · scale  ⇒  volts</text>
  <text x="150" y="929" font-size="13" fill="#0b7a4b">DC must survive — no shared / resampled paths</text>

  <!-- interleave panel -->
  <rect x="710" y="478" width="560" height="320" rx="12" fill="#f5f6f8" stroke="#c4c9d2" stroke-width="1.5"/>
  <text x="734" y="512" font-size="17" font-weight="700" fill="#7a3e9d">the trick: sample-accurate interleave</text>
  <text x="734" y="536" font-size="14" fill="#444444">engine_run fills one block in segments between events</text>

  <text x="734" y="586" font-size="13" fill="#555555">frame 0</text>
  <text x="1246" y="586" font-size="13" fill="#555555" text-anchor="end">nframes</text>
  <rect x="734" y="596" width="170" height="34" fill="#7a3e9d"/>
  <rect x="904" y="596" width="200" height="34" fill="#c04a00"/>
  <rect x="1104" y="596" width="142" height="34" fill="#0b7a4b"/>
  <g stroke="#111111" stroke-width="2"><line x1="904" y1="588" x2="904" y2="640"/><line x1="1104" y1="588" x2="1104" y2="640"/></g>
  <text x="904" y="582" font-size="12.5" fill="#111111" text-anchor="middle">event A</text>
  <text x="1104" y="582" font-size="12.5" fill="#111111" text-anchor="middle">event B</text>
  <g font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">
    <text x="819" y="618">fill 0→A</text><text x="1004" y="618">fill A→B</text><text x="1175" y="618">fill B→N</text>
  </g>

  <text x="734" y="684" font-size="14.5" fill="#222222">1 · fill up to the next event with current state</text>
  <text x="734" y="710" font-size="14.5" fill="#222222">2 · apply the event — state changes here</text>
  <text x="734" y="736" font-size="14.5" fill="#222222">3 · repeat, then fill the tail to nframes</text>
  <text x="734" y="772" font-size="14" fill="#7a3e9d">⇒ an edge lands on the exact frame of its MIDI event,</text>
  <text x="734" y="792" font-size="14" fill="#7a3e9d">   not snapped to the block boundary</text>
</svg>
