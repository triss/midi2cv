<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 900" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333333"/>
    </marker>
    <marker id="arP" markerWidth="13" markerHeight="13" refX="11" refY="6" orient="auto">
      <path d="M1,1 L12,6 L1,11" fill="none" stroke="#7a3e9d" stroke-width="1.8"/>
    </marker>
  </defs>
  <rect width="1340" height="900" fill="#ffffff"/>
  <text x="50" y="56" font-size="29" font-weight="700" fill="#111111">engine_run &amp; the render family</text>
  <text x="50" y="86" font-size="16" fill="#444444">How the core runs: the event walk (left) feeds a dispatch of render adapters (right).</text>

  <text x="120" y="128" font-size="17" font-weight="700" fill="#7a3e9d">① the event walk</text>
  <text x="700" y="128" font-size="17" font-weight="700" fill="#c04a00">② the render dispatch — a family</text>

  <!-- ===== LEFT flow ===== -->
  <rect x="120" y="146" width="360" height="52" rx="10" fill="#ffffff" stroke="#7a3e9d" stroke-width="2.5"/>
  <text x="300" y="178" font-size="15" font-weight="700" fill="#7a3e9d" text-anchor="middle">engine_run · cursor = 0</text>
  <line x1="300" y1="198" x2="300" y2="228" stroke="#333333" stroke-width="2.2" marker-end="url(#ar)"/>

  <rect x="120" y="230" width="360" height="56" rx="10" fill="#ffffff" stroke="#7a3e9d" stroke-width="2.5"/>
  <text x="300" y="256" font-size="15" font-weight="700" fill="#7a3e9d" text-anchor="middle">for each event e</text>
  <text x="300" y="276" font-size="13.5" fill="#444444" text-anchor="middle">(in MIDI time order)</text>
  <line x1="300" y1="286" x2="300" y2="316" stroke="#333333" stroke-width="2.2" marker-end="url(#ar)"/>

  <rect x="150" y="318" width="300" height="60" rx="30" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
  <text x="300" y="344" font-size="15" font-weight="700" fill="#0061a8" text-anchor="middle">e.time &gt; cursor ?</text>
  <text x="300" y="364" font-size="13" fill="#444444" text-anchor="middle">a gap before this event?</text>
  <line x1="300" y1="378" x2="300" y2="410" stroke="#0b7a4b" stroke-width="2.4" marker-end="url(#ar)"/>
  <text x="312" y="398" font-size="13" font-weight="700" fill="#0b7a4b">yes</text>

  <rect x="120" y="412" width="360" height="56" rx="10" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="300" y="438" font-size="14.5" font-weight="700" fill="#c04a00" text-anchor="middle">fill_segment(cursor → e.time)</text>
  <text x="300" y="458" font-size="13" fill="#444444" text-anchor="middle">render the gap · cursor = e.time</text>
  <line x1="300" y1="468" x2="300" y2="500" stroke="#333333" stroke-width="2.2" marker-end="url(#ar)"/>

  <path d="M450,348 C520,348 520,510 482,524" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#ar)"/>
  <text x="528" y="436" font-size="13" font-weight="700" fill="#777777" text-anchor="middle">no</text>

  <rect x="120" y="502" width="360" height="128" rx="10" fill="#ffffff" stroke="#0b7a4b" stroke-width="2.5"/>
  <text x="140" y="530" font-size="15" font-weight="700" fill="#0b7a4b">apply e → mutate state</text>
  <line x1="140" y1="540" x2="460" y2="540" stroke="#cdd9d2" stroke-width="1"/>
  <text x="140" y="562" font-size="13.5" fill="#222222">1 byte · system real-time →</text>
  <text x="158" y="581" font-size="13.5" fill="#222222">clock_tick / start / continue / stop  (clk)</text>
  <text x="140" y="606" font-size="13.5" fill="#222222">3 bytes · channel →</text>
  <text x="158" y="624" font-size="13.5" fill="#222222">note_on / note_off / cc  (state[ch])</text>

  <path d="M120,566 C70,566 70,259 118,259" fill="none" stroke="#7a3e9d" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <text x="56" y="415" font-size="13" fill="#7a3e9d" text-anchor="middle" transform="rotate(-90 56 415)">next event</text>

  <line x1="300" y1="630" x2="300" y2="672" stroke="#333333" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="312" y="658" font-size="13" fill="#444444">after the last event</text>

  <rect x="120" y="674" width="360" height="56" rx="10" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="300" y="700" font-size="14.5" font-weight="700" fill="#c04a00" text-anchor="middle">fill_segment(cursor → nframes)</text>
  <text x="300" y="720" font-size="13" fill="#444444" text-anchor="middle">fill the tail of the block</text>

  <path d="M480,702 C600,702 590,200 700,194" fill="none" stroke="#c04a00" stroke-width="2.2" stroke-dasharray="2 6" marker-end="url(#ar)"/>
  <text x="600" y="430" font-size="13" fill="#c04a00">every fill_segment dispatches ↴</text>

  <!-- ===== RIGHT family ===== -->
  <rect x="700" y="158" width="560" height="74" rx="11" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="722" y="186" font-size="16" font-weight="700" fill="#c04a00">fill_segment(outs, from, to)</text>
  <text x="722" y="210" font-size="13.5" fill="#222222">for each output i:  cv[i].render(&amp;cv[i], outs[i], from, to)</text>
  <text x="722" y="227" font-size="12.5" fill="#c04a00">pointer dispatch — no switch on the hot path</text>
  <line x1="980" y1="232" x2="980" y2="262" stroke="#333333" stroke-width="2.2" marker-end="url(#ar)"/>

  <!-- interface (dashed = abstract) -->
  <rect x="820" y="262" width="320" height="70" rx="35" fill="#ffffff" stroke="#7a3e9d" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="980" y="290" font-size="15" font-weight="700" fill="#7a3e9d" text-anchor="middle">render(cvslot* s, out, from, to)</text>
  <text x="980" y="312" font-size="13" fill="#444444" text-anchor="middle">one interface · bound at engine_init</text>

  <path d="M905,332 C870,358 845,372 824,392" fill="none" stroke="#7a3e9d" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arP)"/>
  <path d="M1085,332 C1110,358 1120,372 1130,392" fill="none" stroke="#7a3e9d" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arP)"/>
  <path d="M945,332 C900,420 830,500 818,556" fill="none" stroke="#7a3e9d" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arP)"/>
  <text x="980" y="360" font-size="12.5" fill="#7a3e9d" text-anchor="middle">one chosen per output ↓</text>

  <rect x="690" y="396" width="270" height="120" rx="11" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="710" y="424" font-size="15" font-weight="700" fill="#c04a00">render_const</text>
  <text x="710" y="448" font-size="13.5" fill="#222222">gate · trig · vel · cc ·</text>
  <text x="710" y="467" font-size="13.5" fill="#222222">pitch (no glide)</text>
  <text x="710" y="494" font-size="13" fill="#555555">one value, flat across</text>
  <text x="710" y="510" font-size="13" fill="#555555">the whole segment</text>

  <rect x="990" y="396" width="270" height="120" rx="11" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="1010" y="424" font-size="15" font-weight="700" fill="#c04a00">render_clock</text>
  <text x="1010" y="448" font-size="13.5" fill="#222222">private: u.clock {width, left}</text>
  <text x="1010" y="475" font-size="13" fill="#555555">high while the pulse</text>
  <text x="1010" y="491" font-size="13" fill="#555555">counts down, else low</text>
  <text x="1010" y="510" font-size="12.5" fill="#c04a00">a generator — no value lookup</text>

  <rect x="690" y="556" width="270" height="120" rx="11" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="710" y="584" font-size="15" font-weight="700" fill="#c04a00">render_glide</text>
  <text x="710" y="608" font-size="13.5" fill="#222222">private: u.glide {current, rate}</text>
  <text x="710" y="635" font-size="13" fill="#555555">slews current toward</text>
  <text x="710" y="651" font-size="13" fill="#555555">the target, one step per frame</text>
  <text x="710" y="670" font-size="12.5" fill="#c04a00">portamento for pitch</text>

  <!-- cvout_sample helper (dashed = shared helper) -->
  <rect x="990" y="556" width="270" height="150" rx="11" fill="#ffffff" stroke="#0b7a4b" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="1010" y="584" font-size="15" font-weight="700" fill="#0b7a4b">cvout_sample(cfg, state)</text>
  <text x="1010" y="607" font-size="12.5" fill="#444444">the shared value table:</text>
  <text x="1010" y="627" font-size="13" fill="#222222">pitch → semitone index</text>
  <text x="1010" y="645" font-size="13" fill="#222222">gate → any note held?</text>
  <text x="1010" y="663" font-size="13" fill="#222222">trig → that note held?</text>
  <text x="1010" y="681" font-size="13" fill="#222222">vel / cc → value / 127</text>
  <text x="1010" y="700" font-size="12.5" fill="#0b7a4b">reads mchan (channel state)</text>

  <path d="M860,468 C940,476 980,558 986,590" fill="none" stroke="#0b7a4b" stroke-width="2" marker-end="url(#ar)"/>
  <text x="905" y="540" font-size="12.5" fill="#0b7a4b">value</text>
  <path d="M960,616 L986,616" stroke="#0b7a4b" stroke-width="2" marker-end="url(#ar)"/>
  <text x="973" y="608" font-size="12.5" fill="#0b7a4b">value</text>

  <!-- legend -->
  <line x1="700" y1="752" x2="730" y2="752" stroke="#7a3e9d" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arP)"/>
  <text x="740" y="757" font-size="13" fill="#444444">a kind of (realises the interface)</text>
  <line x1="1020" y1="752" x2="1050" y2="752" stroke="#0b7a4b" stroke-width="2" marker-end="url(#ar)"/>
  <text x="1060" y="757" font-size="13" fill="#444444">calls / uses</text>
</svg>
