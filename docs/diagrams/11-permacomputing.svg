<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 860" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333333"/>
    </marker>
  </defs>
  <rect width="1340" height="860" fill="#ffffff"/>
  <text x="50" y="56" font-size="28" font-weight="700" fill="#111111">midi2cv · permacomputing — a small core that outlives its hardware</text>
  <text x="50" y="86" font-size="15.5" fill="#444444">≈800 lines of C, no allocation in the audio path, plain-text config, 0BSD. The engine crosses its seam with only</text>
  <text x="50" y="108" font-size="15.5" fill="#444444">midi_ev + planar float + sample rate — so the <tspan font-weight="700">output adapter is the only thing that changes per machine.</tspan></text>

  <!-- DURABLE CORE -->
  <rect x="50" y="140" width="350" height="300" rx="12" fill="#ffffff" stroke="#7a3e9d" stroke-width="2.5"/>
  <text x="72" y="172" font-size="17" font-weight="700" fill="#7a3e9d">THE DURABLE CORE — engine.c</text>
  <text x="72" y="204" font-size="14.5" fill="#222222">• JACK-free — no platform deps</text>
  <text x="72" y="232" font-size="14.5" fill="#222222">• no malloc in the audio path</text>
  <text x="72" y="260" font-size="14.5" fill="#222222">• fixed arrays · libm only</text>
  <text x="72" y="288" font-size="14.5" fill="#222222">• a few KB of object code</text>
  <text x="72" y="316" font-size="14.5" fill="#222222">• one person can read it all</text>
  <rect x="72" y="338" width="306" height="78" rx="9" fill="#f3eef7" stroke="#7a3e9d" stroke-width="1.5"/>
  <text x="225" y="368" font-size="15" font-weight="700" fill="#7a3e9d" text-anchor="middle">Write a new adapter;</text>
  <text x="225" y="392" font-size="15" font-weight="700" fill="#7a3e9d" text-anchor="middle">keep the core.</text>

  <line x1="400" y1="290" x2="452" y2="290" stroke="#333333" stroke-width="2.4" marker-end="url(#ar)"/>
  <text x="426" y="280" font-size="12" fill="#333333" text-anchor="middle">the seam</text>

  <!-- HARDWARE TARGETS -->
  <text x="470" y="134" font-size="15" font-weight="700" fill="#111111">runs on salvaged hardware — pick the adapter to match</text>
  <text x="470" y="156" font-size="13" fill="#0061a8">■ needs an OS (ALSA / JACK)</text>
  <text x="690" y="156" font-size="13" fill="#c04a00">■ bare metal — no OS</text>

  <rect x="470" y="168" width="420" height="84" rx="11" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
  <text x="490" y="196" font-size="15.5" font-weight="700" fill="#0061a8">Raspberry Pi — any gen, incl. Pi 1 / Zero</text>
  <text x="490" y="219" font-size="13.5" fill="#222222">adapter: ALSA / JACK</text>
  <text x="490" y="240" font-size="13.5" fill="#222222">CV out: I2S or USB DAC → CV, or audio → ES-3</text>

  <rect x="470" y="262" width="420" height="84" rx="11" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
  <text x="490" y="290" font-size="15.5" font-weight="700" fill="#0061a8">Old ThinkPad / netbook — Pentium-M era</text>
  <text x="490" y="313" font-size="13.5" fill="#222222">adapter: Linux (Alpine/Debian) + JACK</text>
  <text x="490" y="334" font-size="13.5" fill="#222222">CV out: DC-coupled interface, or ES-3</text>

  <rect x="470" y="356" width="420" height="84" rx="11" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="490" y="384" font-size="15.5" font-weight="700" fill="#c04a00">STM32 / Teensy — bare metal, no OS</text>
  <text x="490" y="407" font-size="13.5" fill="#222222">adapter: tiny SPI-DAC driver (MCP4922)</text>
  <text x="490" y="428" font-size="13.5" fill="#222222">CV out: direct from a $5 board — no ES-3</text>

  <rect x="470" y="450" width="420" height="84" rx="11" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
  <text x="490" y="478" font-size="15.5" font-weight="700" fill="#c04a00">AVR / Arduino — a stretch goal</text>
  <text x="490" y="501" font-size="13.5" fill="#222222">adapter: fixed-point port (no FPU), lower rate</text>
  <text x="490" y="522" font-size="13.5" fill="#222222">CV out: PWM + filter, or R-2R ladder → CV</text>

  <!-- WHY IT FITS -->
  <rect x="912" y="140" width="378" height="394" rx="12" fill="#eaf5ef" stroke="#0b7a4b" stroke-width="2.5"/>
  <text x="934" y="172" font-size="17" font-weight="700" fill="#0b7a4b">WHY IT FITS</text>
  <text x="934" y="208" font-size="14.5" font-weight="700" fill="#222222">Frugal</text>
  <text x="934" y="228" font-size="13.5" fill="#333333">tiny binary, kB of RAM, low MHz</text>
  <text x="934" y="260" font-size="14.5" font-weight="700" fill="#222222">No bloat</text>
  <text x="934" y="280" font-size="13.5" fill="#333333">no GUI; JACK + libm and nothing else</text>
  <text x="934" y="312" font-size="14.5" font-weight="700" fill="#222222">Durable</text>
  <text x="934" y="332" font-size="13.5" fill="#333333">the seam: new I/O, same core</text>
  <text x="934" y="364" font-size="14.5" font-weight="700" fill="#222222">Legible &amp; repairable</text>
  <text x="934" y="384" font-size="13.5" fill="#333333">read it all in an afternoon; text config</text>
  <text x="934" y="416" font-size="14.5" font-weight="700" fill="#222222">Frictionless</text>
  <text x="934" y="436" font-size="13.5" fill="#333333">0BSD — share &amp; fork forever, no terms</text>
  <text x="934" y="468" font-size="14.5" font-weight="700" fill="#222222">Salvage-first</text>
  <text x="934" y="488" font-size="13.5" fill="#333333">old laptop / dead phone / $3 MCU</text>
  <text x="934" y="508" font-size="13.5" fill="#333333">becomes a working synth voice</text>

  <text x="50" y="588" font-size="15.5" fill="#222222">Permacomputing asks software to do more with less, and to outlive the machine it was born on. A JACK-free core behind a</text>
  <text x="50" y="612" font-size="15.5" fill="#222222">one-function seam does exactly that: the computer can be salvaged or swapped, and the part that makes the music stays.</text>
</svg>
