<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 800" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1340" height="800" fill="#ffffff"/>
  <text x="50" y="56" font-size="29" font-weight="700" fill="#111111">Minsky · a society of mindless agents</text>
  <text x="50" y="86" font-size="16" fill="#444444">No single part understands music; the whole society does. And each CV output is a frame of slots with defaults.</text>

  <!-- ============ SOCIETY ============ -->
  <rect x="40" y="112" width="770" height="648" rx="14" fill="#f5f6f8" stroke="#c4c9d2" stroke-width="1.5"/>
  <text x="64" y="146" font-size="18" font-weight="700" fill="#0061a8">THE SOCIETY OF AGENTS</text>

  <!-- conductor -->
  <rect x="288" y="162" width="274" height="74" rx="10" fill="#ffffff" stroke="#7a3e9d" stroke-width="2.5"/>
  <text x="425" y="192" font-size="16" font-weight="700" fill="#7a3e9d" text-anchor="middle">conductor · engine_run</text>
  <text x="425" y="216" font-size="14" fill="#333333" text-anchor="middle">sequences events in time — and understands nothing</text>

  <!-- readers (blue) -->
  <g>
    <rect x="64" y="272" width="232" height="82" rx="10" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
    <text x="180" y="302" font-size="15" font-weight="700" fill="#0061a8" text-anchor="middle">note-stack</text>
    <text x="180" y="326" font-size="14" fill="#333333" text-anchor="middle">tracks which</text>
    <text x="180" y="344" font-size="14" fill="#333333" text-anchor="middle">notes are down</text>

    <rect x="312" y="272" width="232" height="82" rx="10" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
    <text x="428" y="302" font-size="15" font-weight="700" fill="#0061a8" text-anchor="middle">clock</text>
    <text x="428" y="326" font-size="14" fill="#333333" text-anchor="middle">counts MIDI</text>
    <text x="428" y="344" font-size="14" fill="#333333" text-anchor="middle">clock pulses</text>

    <rect x="560" y="272" width="232" height="82" rx="10" fill="#ffffff" stroke="#0061a8" stroke-width="2.5"/>
    <text x="676" y="302" font-size="15" font-weight="700" fill="#0061a8" text-anchor="middle">cvout_sample</text>
    <text x="676" y="326" font-size="14" fill="#333333" text-anchor="middle">reads one value</text>
    <text x="676" y="344" font-size="14" fill="#333333" text-anchor="middle">from the board</text>
  </g>
  <text x="64" y="266" font-size="13" font-weight="700" fill="#0061a8">READERS</text>

  <!-- renderers (orange) -->
  <g>
    <rect x="64" y="386" width="232" height="82" rx="10" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
    <text x="180" y="416" font-size="15" font-weight="700" fill="#c04a00" text-anchor="middle">render_const</text>
    <text x="180" y="440" font-size="14" fill="#333333" text-anchor="middle">writes one</text>
    <text x="180" y="458" font-size="14" fill="#333333" text-anchor="middle">flat value</text>

    <rect x="312" y="386" width="232" height="82" rx="10" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
    <text x="428" y="416" font-size="15" font-weight="700" fill="#c04a00" text-anchor="middle">render_clock</text>
    <text x="428" y="440" font-size="14" fill="#333333" text-anchor="middle">blinks</text>
    <text x="428" y="458" font-size="14" fill="#333333" text-anchor="middle">high then low</text>

    <rect x="560" y="386" width="232" height="82" rx="10" fill="#ffffff" stroke="#c04a00" stroke-width="2.5"/>
    <text x="676" y="416" font-size="15" font-weight="700" fill="#c04a00" text-anchor="middle">render_glide</text>
    <text x="676" y="440" font-size="14" fill="#333333" text-anchor="middle">slews toward</text>
    <text x="676" y="458" font-size="14" fill="#333333" text-anchor="middle">a target</text>
  </g>
  <text x="64" y="380" font-size="13" font-weight="700" fill="#c04a00">RENDERERS</text>

  <!-- blackboard (green) -->
  <rect x="64" y="498" width="728" height="74" rx="10" fill="#ffffff" stroke="#0b7a4b" stroke-width="2.5"/>
  <text x="428" y="528" font-size="16" font-weight="700" fill="#0b7a4b" text-anchor="middle">state[ ] — the shared blackboard</text>
  <text x="428" y="552" font-size="14" fill="#333333" text-anchor="middle">held notes · CC · velocity · clock phase. Every agent writes here and reads here.</text>

  <!-- emergence -->
  <rect x="64" y="592" width="728" height="148" rx="10" fill="#eaf5ef" stroke="#0b7a4b" stroke-width="2"/>
  <text x="428" y="626" font-size="17" font-weight="700" fill="#0b7a4b" text-anchor="middle">Put them together — and you can play it.</text>
  <text x="428" y="654" font-size="14.5" fill="#222222" text-anchor="middle">Competence without comprehension: the instrument is the whole society,</text>
  <text x="428" y="676" font-size="14.5" fill="#222222" text-anchor="middle">not any one agent. Adding a source just recruits one more dumb agent.</text>
  <text x="428" y="712" font-size="14" fill="#444444" text-anchor="middle" font-style="italic">“What magical trick makes us intelligent? The trick is that there is no trick.”</text>

  <!-- ============ FRAME ============ -->
  <rect x="838" y="112" width="462" height="560" rx="14" fill="#f5f6f8" stroke="#c4c9d2" stroke-width="1.5"/>
  <text x="862" y="146" font-size="18" font-weight="700" fill="#111111">FRAME · cvout</text>
  <text x="862" y="170" font-size="14" fill="#444444">slots, filled from the line — or from defaults</text>

  <!-- default highlight band -->
  <rect x="852" y="452" width="434" height="128" rx="8" fill="#eaf5ef" stroke="#0b7a4b" stroke-width="1.5"/>
  <text x="868" y="444" font-size="13" font-weight="700" fill="#0b7a4b">filled by DEFAULT when the line omits them</text>

  <g font-size="15">
    <!-- given slots -->
    <g>
      <text x="868" y="214" font-weight="700" fill="#111111">src</text>
      <text x="868" y="262" font-weight="700" fill="#111111">midich</text>
      <text x="868" y="310" font-weight="700" fill="#111111">param</text>
      <text x="868" y="358" font-weight="700" fill="#111111">scale</text>
      <text x="868" y="406" font-weight="700" fill="#111111">offset</text>
      <text x="868" y="494" font-weight="700" fill="#0b7a4b">pulse_ms</text>
      <text x="868" y="542" font-weight="700" fill="#0b7a4b">glide_ms</text>
    </g>
    <!-- value chips -->
    <g>
      <rect x="1040" y="196" width="118" height="30" rx="6" fill="#ffffff" stroke="#0061a8" stroke-width="2"/><text x="1099" y="217" fill="#111111" text-anchor="middle">pitch</text>
      <rect x="1040" y="244" width="118" height="30" rx="6" fill="#ffffff" stroke="#0061a8" stroke-width="2"/><text x="1099" y="265" fill="#111111" text-anchor="middle">1</text>
      <rect x="1040" y="292" width="118" height="30" rx="6" fill="#ffffff" stroke="#0061a8" stroke-width="2"/><text x="1099" y="313" fill="#111111" text-anchor="middle">-</text>
      <rect x="1040" y="340" width="118" height="30" rx="6" fill="#ffffff" stroke="#0061a8" stroke-width="2"/><text x="1099" y="361" fill="#111111" text-anchor="middle">0.0083</text>
      <rect x="1040" y="388" width="118" height="30" rx="6" fill="#ffffff" stroke="#0061a8" stroke-width="2"/><text x="1099" y="409" fill="#111111" text-anchor="middle">0.0</text>
      <rect x="1040" y="476" width="118" height="30" rx="6" fill="#ffffff" stroke="#0b7a4b" stroke-width="2"/><text x="1099" y="497" fill="#111111" text-anchor="middle">5</text>
      <rect x="1040" y="524" width="118" height="30" rx="6" fill="#ffffff" stroke="#0b7a4b" stroke-width="2"/><text x="1099" y="545" fill="#111111" text-anchor="middle">0</text>
    </g>
    <!-- tags -->
    <g font-size="13" fill="#555555">
      <text x="1176" y="216">required</text>
      <text x="1176" y="264">1..16</text>
      <text x="1176" y="312">−1</text>
      <text x="1176" y="360">calibrate</text>
      <text x="1176" y="408">calibrate</text>
      <text x="1176" y="496" fill="#0b7a4b" font-weight="700">no pulse</text>
      <text x="1176" y="544" fill="#0b7a4b" font-weight="700">no glide</text>
    </g>
  </g>
  <text x="862" y="616" font-size="14" fill="#333333">The line fills the slots it names; the frame</text>
  <text x="862" y="638" font-size="14" fill="#333333">supplies the rest. Exactly Minsky's frames:</text>
  <text x="862" y="660" font-size="14" fill="#333333">terminals with default assignments.</text>
</svg>
